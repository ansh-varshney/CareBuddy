version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: carebuddy-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
    networks:
      - carebuddy-net
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: carebuddy-postgres
    environment:
      POSTGRES_USER: carebuddy
      POSTGRES_PASSWORD: carebuddy_pass
      POSTGRES_DB: carebuddy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U carebuddy" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - carebuddy-net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: carebuddy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - carebuddy-net

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: carebuddy-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - carebuddy-net

volumes:
  postgres_data:
  redis_data:
  chroma_data:


networks:
  carebuddy-net:
    driver: bridge
